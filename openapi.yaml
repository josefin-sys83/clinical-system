openapi: 3.0.3
info:
  title: Clinical System API
  version: 0.1.0
servers:
  - url: http://localhost:3001
paths:
/api/auth/login:
  post:
    tags: [auth]
    summary: Demo login (returns JWT)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [username, password]
            properties:
              username: { type: string }
              password: { type: string }
    responses:
      '200':
        description: OK
/api/auth/me:
  get:
    tags: [auth]
    summary: Current user (JWT)
    security: [{ bearerAuth: [] }]
    responses:
      '200': { description: OK }
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /api/me:
    get:
      summary: Current user (placeholder until real auth)
      responses:
        '200':
          description: OK
  /api/projects:
    get:
      summary: List projects
      responses:
        '200':
          description: OK
    post:
      summary: Create project (initializes workflow)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        '200':
          description: Created
  /api/projects/completed:
    get:
      summary: List completed projects
      responses:
        '200':
          description: OK
  /api/projects/{projectId}:
    get:
      summary: Get project
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
  /api/projects/{projectId}/workflow:
    get:
      summary: Get workflow snapshot (stepId -> state)
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
  /api/projects/{projectId}/workflow/{stepId}/transition:
    post:
      summary: Transition a workflow step state (also writes audit event)
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: stepId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [start_review, request_changes, approve, sign, finalize, mark_ready, mark_input_needed]
                reason: { type: string }
                actorUserId: { type: string }
      responses:
        '200':
          description: OK
  /api/projects/{projectId}/audit:
    get:
      summary: List audit events (optionally filter by stepId)
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: stepId
          required: false
          schema: { type: string }
      responses:
        '200':
          description: OK

  /api/projects/{projectId}/documents/{docType}/finalize:
    post:
      summary: Finalize a document export (creates immutable PDF artifact)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: docType
          required: true
          schema: { type: string, enum: [protocol, report] }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string }
      responses:
        '200': { description: OK }

  /api/projects/{projectId}/documents/artifacts/{artifactId}:
    get:
      summary: Download a document artifact
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: artifactId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }

  /api/projects/{projectId}/documents/artifacts/{artifactId}/verify:
    get:
      summary: Verify artifact bytes SHA-256 matches stored hash
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: artifactId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
    post:
      summary: Create an audit event
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, message]
              properties:
                type: { type: string }
                message: { type: string }
                stepId: { type: string }
                actorUserId: { type: string }
                metadataJson: { type: string, description: "JSON string" }
      responses:
        '200':
          description: OK


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT